<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom smooth transitions */
        .input-focus {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-gradient-to-r from-red-800 to-rose-900 px-6 py-8 text-white text-center sm:text-left">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Wine Quality Analytics</h1>
            <p class="mt-2 text-rose-100 text-sm sm:text-base">Enter the chemical properties below to predict the quality score.</p>
        </div>

        <form id="wine-form" class="p-6 sm:p-8 space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                
                <div>
                    <label for="fixed_acidity" class="block text-sm font-semibold text-slate-700 mb-1">Fixed Acidity</label>
                    <input type="number" id="fixed_acidity" name="fixed_acidity" min="0.0" max="20.0" step="0.1" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="volatile_acidity" class="block text-sm font-semibold text-slate-700 mb-1">Volatile Acidity</label>
                    <input type="number" id="volatile_acidity" name="volatile_acidity" min="0.0" max="2.0" step="0.01" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="citric_acid" class="block text-sm font-semibold text-slate-700 mb-1">Citric Acid</label>
                    <input type="number" id="citric_acid" name="citric_acid" min="0.0" max="2.0" step="0.01" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="residual_sugar" class="block text-sm font-semibold text-slate-700 mb-1">Residual Sugar</label>
                    <input type="number" id="residual_sugar" name="residual_sugar" min="0.0" max="100.0" step="0.1" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="chlorides" class="block text-sm font-semibold text-slate-700 mb-1">Chlorides</label>
                    <input type="number" id="chlorides" name="chlorides" min="0.0" max="1.0" step="0.01" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="freesulfurdioxide" class="block text-sm font-semibold text-slate-700 mb-1">Free Sulfur Dioxide</label>
                    <input type="number" id="freesulfurdioxide" name="freesulfurdioxide" min="0" max="300" step="1" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="totalsulfurdioxide" class="block text-sm font-semibold text-slate-700 mb-1">Total Sulfur Dioxide</label>
                    <input type="number" id="totalsulfurdioxide" name="totalsulfurdioxide" min="0" max="600" step="1" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="density" class="block text-sm font-semibold text-slate-700 mb-1">Density</label>
                    <input type="number" id="density" name="density" min="0.0" max="2.0" step="0.001" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="ph" class="block text-sm font-semibold text-slate-700 mb-1">pH</label>
                    <input type="number" id="ph" name="ph" min="0.0" max="14.0" step="0.01" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div>
                    <label for="sulphates" class="block text-sm font-semibold text-slate-700 mb-1">Sulphates</label>
                    <input type="number" id="sulphates" name="sulphates" min="0.0" max="2.0" step="0.01" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>

                <div class="sm:col-span-2">
                    <label for="alcohol" class="block text-sm font-semibold text-slate-700 mb-1">Alcohol (%)</label>
                    <input type="number" id="alcohol" name="alcohol" min="0.0" max="20.0" step="0.1" required
                        class="input-focus w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-red-700 focus:ring-2 focus:ring-red-100 outline-none text-sm bg-slate-50/50">
                </div>
            </div>

            <div class="pt-4 border-t border-slate-100 flex flex-col items-center">
                <button type="submit" id="submit-btn" 
                    class="w-full sm:w-auto px-8 py-3 bg-red-800 hover:bg-red-900 text-white font-medium rounded-xl shadow-md transition-colors duration-150 flex items-center justify-center gap-2 outline-none focus:ring-4 focus:ring-red-200">
                    <span>Predict Wine Quality</span>
                </button>
            </div>
        </form>

        <div id="result-container" class="hidden px-6 pb-8 sm:px-8">
            <div id="result-card" class="p-4 rounded-xl text-center font-medium transition-all duration-300">
                </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('wine-form');
        const submitBtn = document.getElementById('submit-btn');
        const resultContainer = document.getElementById('result-container');
        const resultCard = document.getElementById('result-card');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            // 1. Enter Loading State
            setLoading(true);
            hideResult();

            // 2. Parse Form Data directly to a structured object
            const formData = new FormData(form);
            const payload = {};
            
            formData.forEach((value, key) => {
                // Convert numerical strings to real numeric floats/ints for the backend
                payload[key] = parseFloat(value);
            });

            try {
                // 3. Perform modern JSON POST API call
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) {
                    throw new Error(`Server returned error status: ${response.status}`);
                }

                const data = await response.json();

                // 4. Render Success UI state
                showResult(`Prediction Quality: ${data.result}`, 'success');

            } catch (error) {
                console.error("Prediction Request Failed:", error);
                // 5. Render Error UI state gracefully
                showResult('Failed to calculate prediction. Please verify inputs and try again.', 'error');
            } finally {
                // 6. Tear down Loading State
                setLoading(false);
            }
        });

        // Helper function to manage loading visual states
        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
                submitBtn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Processing Analytics...</span>
                `;
            } else {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                submitBtn.innerHTML = `<span>Predict Wine Quality</span>`;
            }
        }

        // Helper function to show contextual results
        function showResult(message, type) {
            resultContainer.classList.remove('hidden');
            resultCard.innerText = message;
            
            if (type === 'success') {
                resultCard.className = 'p-4 rounded-xl text-center font-semibold bg-emerald-50 text-emerald-800 border border-emerald-200';
            } else {
                resultCard.className = 'p-4 rounded-xl text-center font-semibold bg-rose-50 text-rose-800 border border-rose-200';
            }
        }

        // Helper function to clear response UI
        function hideResult() {
            resultContainer.classList.add('hidden');
            resultCard.innerText = '';
        }
    </script>
</body>
</html>
